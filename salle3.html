<html>

<body>

<!-- CONTENEUR GLOBAL -->
<div class="scene">

    <!-- IMAGE = "fenêtre" -->

        <!-- Chrono (dans l’image) -->
        <div id="timerDisplay">0:00</div>

	<!-- Bloc consignes -->
	<div class="bloc">

Sélectionnez les zones de la ligne de perfusion qui contiennent des erreurs ou présentent un risque.
	</div>

<div class="zone-rond" onclick="toggleRond(this)" data-correct="true" style="top:15%; left:18%; width:clamp(12px, 5vw, 70px); height:clamp(12px, 5vw, 70px);"></div>
<div class="zone-rond" onclick="toggleRond(this)" data-correct="true" style="top:60%; left:55%; width:clamp(12px, 3vw, 40px); height:clamp(12px, 3vw, 40px);"></div>

<div class="zone-rond" onclick="toggleRond(this)" data-correct="true" style="top:70%; left:25%; width:clamp(12px, 3vw, 40px); height:clamp(12px, 3vw, 40px);"></div>
<div class="zone-rond" onclick="toggleRond(this)" data-correct="true" style="top:70%; left:25%; width:clamp(12px, 3vw, 40px); height:clamp(12px, 3vw, 40px);"></div>
<div class="zone-rond" onclick="toggleRond(this)" data-correct="true" style="top:70%; left:25%; width:clamp(12px, 3vw, 40px); height:clamp(12px, 3vw, 40px);"></div>

<!-- bouton -->
<button id="valider" onclick="validerRonds()">Valider</button>

<!-- ========================= -->
<!-- REPONSE (bloc centré) -->

<div id="reponseSalle3" class="bloc-intro" style="display:none;">

</div>

<!-- POPUP ERREUR -->
<div id="popup" class="popup" style="display:none;">
    <div class="ligne-consigne">
        <span id="popup-text"></span>
        <span class="arrow">➡</span>
    </div>
</div>

</div>

<!-- SCRIPTS -->
<script src="js/salle3.js"></script>
